<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Justpen - Membuat Coretan</title>
    <style>
        :root {
            --paper: #ffffff;
            --ink: #1a1a1a;
            --stabilo-color: #ffcc00;
            --ui-bg: #f2f2f7;
            --accent: #007AFF;
            --danger: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--ui-bg);
            font-family: -apple-system, system-ui, sans-serif;
            /* Prevent bounce & accidental scroll */
            touch-action: none;
            overscroll-behavior: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Area Canvas */
        #canvas-wrapper {
            flex: 1;
            background-color: var(--paper);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            position: relative;
            cursor: crosshair;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* Toolbar Modern */
        #toolbar {
            height: 100px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tool-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2.5px solid transparent;
            position: relative;
        }

        .tool-label {
            font-size: 11px;
            font-weight: 600;
            color: #8e8e93;
        }

        .active .icon-box {
            transform: scale(1.1) translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 8px 15px rgba(0, 122, 255, 0.15);
        }

        .active .tool-label {
            color: var(--accent);
        }

        /* Tool Styles */
        .bg-pen { background-color: var(--ink); }
        .bg-stabilo { background-color: var(--stabilo-color); }
        .bg-tipex { background-color: #fff; border: 2.5px solid #d1d1d6 !important; }
        .bg-reset { background-color: var(--danger); }

        /* Custom Modal UI */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        #modal {
            background: white;
            width: 85%;
            max-width: 300px;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #modal.show { transform: translateY(0); opacity: 1; }

        #modal h3 { font-size: 19px; margin-bottom: 10px; color: #1c1c1e; }
        #modal p { font-size: 14px; margin-bottom: 24px; color: #3a3a3c; line-height: 1.4; }

        .modal-btns { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 14px;
        }
        .btn-no { background: #f2f2f7; color: #1c1c1e; }
        .btn-yes { background: var(--danger); color: white; }

        #status-pill {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.06);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: #636366;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-wrapper">
        <div id="status-pill">Tersimpan</div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <nav id="toolbar">
        <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')">
            <div class="icon-box bg-pen"></div>
            <span class="tool-label">Pulpen</span>
        </button>
        
        <button class="tool-btn" id="btn-stabilo" onclick="setTool('stabilo')">
            <div class="icon-box bg-stabilo"></div>
            <span class="tool-label">Stabilo</span>
        </button>

        <button class="tool-btn" id="btn-tipex" onclick="setTool('tipex')">
            <div class="icon-box bg-tipex"></div>
            <span class="tool-label">Tip-Ex</span>
        </button>

        <button class="tool-btn" onclick="openModal()">
            <div class="icon-box bg-reset"></div>
            <span class="tool-label">Ganti Kertas</span>
        </button>
    </nav>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h3>Ganti Kertas?</h3>
        <p>Hapus seluruh coretan dan mulai dengan kertas baru yang bersih.</p>
        <div class="modal-btns">
            <button class="btn btn-no" onclick="closeModal()">Batal</button>
            <button class="btn btn-yes" onclick="clearCanvas()">Hapus</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d', { desynchronized: true });
    const wrapper = document.getElementById('canvas-wrapper');
    const overlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('modal');
    const statusPill = document.getElementById('status-pill');

    let isDrawing = false;
    let currentTool = 'pen';
    let lastX = 0, lastY = 0;
    let saveTimeout = null;

    // Retina Support & Proper Sizing
    function initSize() {
        const dpr = window.devicePixelRatio || 1;
        const rect = wrapper.getBoundingClientRect();
        
        // Simpan data gambar saat ini sebelum resize
        const tempImg = canvas.toDataURL();

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        
        ctx.scale(dpr, dpr);
        
        // Restore image
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = localStorage.getItem('justpen_v2') || tempImg;

        applyToolSettings();
    }

    function applyToolSettings() {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.globalAlpha = 1.0;
        ctx.globalCompositeOperation = 'source-over';

        if (currentTool === 'pen') {
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 2.2;
        } else if (currentTool === 'stabilo') {
            // Realistic Stacking Effect
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 32;
        } else if (currentTool === 'tipex') {
            // Real Erase (Destination-Out)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 45;
        }
    }

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${t}`).classList.add('active');
        applyToolSettings();
    }

    // Drawing Logic
    function handleStart(e) {
        isDrawing = true;
        const pos = getPos(e);
        [lastX, lastY] = [pos.x, pos.y];
        
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
    }

    function handleMove(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        
        [lastX, lastY] = [pos.x, pos.y];
    }

    function handleEnd() {
        if (!isDrawing) return;
        isDrawing = false;
        debouncedSave();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    // Storage dengan Debounce
    function debouncedSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            localStorage.setItem('justpen_v2', canvas.toDataURL('image/png', 0.8));
            showStatus('Tersimpan otomatis');
        }, 500);
    }

    function showStatus(text) {
        statusPill.textContent = text;
        statusPill.style.opacity = '1';
        setTimeout(() => statusPill.style.opacity = '0', 1500);
    }

    // Modal Logic
    function openModal() {
        overlay.style.display = 'flex';
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() {
        modal.classList.remove('show');
        setTimeout(() => overlay.style.display = 'none', 300);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        localStorage.removeItem('justpen_v2');
        closeModal();
        showStatus('Kertas baru siap');
    }

    // Event Listeners
    window.addEventListener('resize', initSize);
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
    canvas.addEventListener('touchend', handleEnd);

    // Bootstrap
    window.onload = () => {
        initSize();
        const saved = localStorage.getItem('justpen_v2');
        if (saved) {
            const img = new Image();
            img.onload = () => {
                const rect = wrapper.getBoundingClientRect();
                ctx.drawImage(img, 0, 0, rect.width, rect.height);
            };
            img.src = saved;
        }
    };
</script>
</body>
</html>
