  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 48px 40px;
    }

    .dir-header {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      user-select: none;
    }

    .dir-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dir-item a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 14px;
      transition: background 0.12s ease;
      width: fit-content;
    }

    .dir-item a:hover {
      background: #f4f4f5;
    }

    .dir-item a:active {
      background: #ebebec;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: inherit;
    }

    .app-name {
      font-weight: 450;
      letter-spacing: -0.01em;
    }
  </style>
</head>
