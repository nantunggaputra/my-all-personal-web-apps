<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff">
  <title>☰ My All Personal Web Apps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 48px 40px;
    }

    .dir-header {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      user-select: none;
    }

    .dir-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dir-item a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 14px;
      transition: background 0.12s ease;
      width: fit-content;
    }

    .dir-item a:hover {
      background: #f4f4f5;
    }

    .dir-item a:active {
      background: #ebebec;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: inherit;
    }

    .app-name {
      font-weight: 450;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>

  <div class="dir-header">Index of /</div>
  <div class="dir-list">
    <div class="dir-item">
      <a href="binaria-v3/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span class="app-name">Binaria v3</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="buku-pustaka/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span class="app-name">Buku Pustaka</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="ceklis-sholat/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L15.5 8.5L22 10L17 15L18 22L12 18.5L6 22L7 15L2 10L8.5 8.5L12 2Z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span class="app-name">Ceklis Sholat</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="fastodo/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span class="app-name">Fastodo</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="kartu-ucapan-idul-fitri/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span class="app-name">Kartu Ucapan Idul Fitri</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="letsfokus/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="6"></circle>
          <circle cx="12" cy="12" r="2"></circle>
        </svg>
        <span class="app-name">Letsfokus</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="maitaimtabel/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="app-name">Maitaimtabel</span>
      </a>
    </div>
    <div class="dir-item">
      <a href="znippetmep/">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span class="app-name">Znippetmep</span>
      </a>
    </div>
  </div>

</body>
</html>
